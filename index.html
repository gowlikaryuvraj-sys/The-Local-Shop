<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Local Shop</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#f4f6f9;
font-family:'Poppins',sans-serif;
}


/* HERO */

.hero{
height:100vh;
background:url('https://images.magnific.ai/preview.jpg') center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.5);
}

.hero-content{
position:relative;
color:white;
z-index:2;
}

.hero h1{
font-size:3rem;
margin-bottom:10px;
}

.hero p{
font-size:1.2rem;
margin-bottom:20px;
}

.shop-btn{
padding:14px 30px;
border:none;
background:#ff6b00;
color:white;
border-radius:30px;
cursor:pointer;
font-size:18px;
}

/* PRODUCTS */

.products{
padding:60px 20px;
}

.section-title{
text-align:center;
margin-bottom:30px;
font-size:32px;
}

.carousel{
display:flex;
overflow-x:auto;
gap:20px;
scroll-behavior:smooth;
padding-bottom:10px;
}

.carousel::-webkit-scrollbar{
display:none;
}

.card{
min-width:280px;
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.15);
transition:.3s;
}
.card:hover{
transform:translateY(-8px);
}
.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
font-size:20px;
font-weight:bold;
margin:10px 0;
}

.add-btn{
width:100%;
padding:15px;
background:#ff6b00;
color:white;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
display:block;
}


/* CART */

.cart-icon{
position:fixed;
right:20px;
bottom:100px;
width:60px;
height:60px;
background:#ff6b00;
color:white;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
font-size:24px;
cursor:pointer;
z-index:999;
}

.cart-count{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:white;
width:22px;
height:22px;
border-radius:50%;
font-size:12px;
display:flex;
justify-content:center;
align-items:center;
}

.cart-drawer{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:white;
padding:20px;
box-shadow:-5px 0 15px rgba(0,0,0,.2);
transition:.3s;
overflow-y:auto;
z-index:1000;
}

.cart-drawer.active{
right:0;
}

.cart-item{
margin-bottom:10px;
padding:10px;
border-bottom:1px solid #ddd;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:8px;
}

.send-btn{
width:100%;
padding:12px;
margin-top:15px;
background:#007bff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
right:20px;
bottom:20px;
width:60px;
height:60px;
background:#25D366;
color:white;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
text-decoration:none;
z-index:999;
}

@media(max-width:768px){
.hero h1{
font-size:2rem;
}
}
</style>
</head>
<body>

<!-- HERO -->

<section class="hero">

<div class="hero-content">
<h1>🛒 The Local Shop</h1>
<p>Everything You Need, Delivered Fast</p>

<button class="shop-btn"
onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})">
Shop Now
</button>

</div>

</section>

<!-- PRODUCTS -->

<section id="products" class="products">

<h2 class="section-title">Our Products</h2>
  <input
type="text"
id="search"
placeholder="🔍 Search Products..."
onkeyup="searchProducts()"
style="
width:100%;
max-width:500px;
display:block;
margin:0 auto 30px;
padding:15px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
">

<div class="carousel">

<div class="card">
<img src="https://picsum.photos/300/300?random=11">
<div class="card-content">
<h3>Wireless Earbuds</h3>
<div class="price">₹3999</div>
<button class="add-btn" onclick="addToCart('Wireless Earbuds',3999)">
Add To Cart
</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600">
<div class="card-content">
<h3>Sports Watch</h3>
<div class="price">₹4999</div>
<button class="add-btn" onclick="addToCart('Sports Watch',4999)">
Add To Cart
</button>

</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1583863788434-e58a36330cf0?w=600">
<div class="card-content">
<h3>Power Bank</h3>
<div class="price">₹1999</div>
<button class="add-btn" onclick="addToCart('Power Bank',1999)">
Add To Cart
</button>
</div>
</div>

</div>

</section>

<!-- CART ICON -->
<div class="cart-icon" onclick="toggleCart()">
<i class="fa-solid fa-cart-shopping"></i>
<div class="cart-count" id="count">0</div>
</div>

<!-- CART DRAWER -->

<div class="cart-drawer" id="drawer">

<h2>Your Cart</h2>

<div id="cartItems"></div>
<h3 id="totalAmount" style="margin-top:15px;">
Total: ₹0
</h3>
<input
type="text"
id="customerName"
placeholder="Customer Name">

<input
type="text"
id="customerPhone"
placeholder="Phone Number">

<button class="send-btn" onclick="sendOrder()">
Send Order
</button>

</div>

<!-- WHATSAPP -->

<a
href="https://wa.me/919346238141"
target="_blank"
class="whatsapp">
<i class="fab fa-whatsapp"></i>
</a>

<script>

emailjs.init("vaW_SdFi_NhOOr9Bs");

let cart=[];

function addToCart(name,price){
window.alert("HELLO");
cart.push({
name,
price
});

updateCart();

}

function updateCart(){

document.getElementById("count").innerText=cart.length;

let html="";
let total=0;
cart.forEach(item=>{
total += item.price;
html+=`
<div class="cart-item">
${item.name} - ₹${item.price}
</div>
`;

});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("totalAmount").innerText =
"Total: ₹" + total;
}


  function searchProducts(){

let value =
document.getElementById("search")
.value
.toLowerCase();

let cards =
document.querySelectorAll(".card");

cards.forEach(card=>{

let title =
card.querySelector("h3")
.innerText
.toLowerCase();

if(title.includes(value)){
card.style.display="block";
}else{
card.style.display="none";
}

});

  }function toggleCart(){

document
.getElementById("drawer")
.classList
.toggle("active");

}

function sendOrder(){

let customerName=
document.getElementById("customerName").value;

let customerPhone=
document.getElementById("customerPhone").value;
if(!customerName || !customerPhone){

alert("Enter customer details");
return;

}

let orderList=
cart.map(i=>`${i.name} - ₹${i.price}`)
.join("\n");

emailjs.send(
"service_277zwdn",
"template_5vqzuua",
{
customer_name:customerName,
customer_phone:customerPhone,
owner_email:"yuvrajgowlikar@gmail.com",
phone_number:"9346238141",
order_items:orderList
}
)
.then(()=>{

alert("Order Sent Successfully");

cart=[];
updateCart();

})
.catch(err=>{

console.log(err);
alert("Failed To Send");

});

}

  setInterval(() => {
  const carousel = document.querySelector(".carousel");

  if (!carousel) return;

  carousel.scrollLeft += 280;

  if (
    carousel.scrollLeft + carousel.clientWidth >=
    carousel.scrollWidth
  ) {
    carousel.scrollLeft = 0;
  }
}, 3000);

</script>

</body>
</html>
