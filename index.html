<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Local Shop</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#f7f7f7;
}

/* HERO */

.hero{
height:100vh;
background:url('https://images.magnific.ai/preview.jpg') center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.5);
}

.hero-content{
position:relative;
color:white;
z-index:2;
}

.hero h1{
font-size:3rem;
margin-bottom:10px;
}

.hero p{
font-size:1.2rem;
margin-bottom:20px;
}

.shop-btn{
padding:14px 30px;
border:none;
background:#ff6b00;
color:white;
border-radius:30px;
cursor:pointer;
font-size:18px;
}

/* PRODUCTS */

.products{
padding:60px 20px;
}

.section-title{
text-align:center;
margin-bottom:30px;
font-size:32px;
}

.carousel{
display:flex;
overflow-x:auto;
gap:20px;
scroll-behavior:smooth;
padding-bottom:10px;
}

.carousel::-webkit-scrollbar{
display:none;
}

.card{
min-width:260px;
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
font-size:20px;
font-weight:bold;
margin:10px 0;
}

.add-btn{
width:100%;
padding:12px;
background:#28a745;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

/* CART */

.cart-icon{
position:fixed;
right:20px;
bottom:90px;
width:60px;
height:60px;
background:#ff6b00;
color:white;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
font-size:24px;
cursor:pointer;
z-index:999;
}

.cart-count{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:white;
width:22px;
height:22px;
border-radius:50%;
font-size:12px;
display:flex;
justify-content:center;
align-items:center;
}

.cart-drawer{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:white;
padding:20px;
box-shadow:-5px 0 15px rgba(0,0,0,.2);
transition:.3s;
overflow-y:auto;
z-index:1000;
}

.cart-drawer.active{
right:0;
}

.cart-item{
margin-bottom:10px;
padding:10px;
border-bottom:1px solid #ddd;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:8px;
}

.send-btn{
width:100%;
padding:12px;
margin-top:15px;
background:#007bff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
right:20px;
bottom:20px;
width:60px;
height:60px;
background:#25D366;
color:white;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
text-decoration:none;
z-index:999;
}

@media(max-width:768px){
.hero h1{
font-size:2rem;
}
}
</style>
</head>
<body>

<!-- HERO -->

<section class="hero">

<div class="hero-content">
<h1>The Local Shop</h1>
<p>Fresh Finds, Best Prices</p>

<a href="#products">
<button class="shop-btn">Shop Now</button>
</a>

</div>

</section>

<!-- PRODUCTS -->

<section id="products" class="products">

<h2 class="section-title">Our Products</h2>

<div class="carousel">

<div class="card">
<img src="https://picsum.photos/300/300?1">
<div class="card-content">
<h3>Product 1</h3>
<div class="price">₹99</div>
<button class="add-btn"
onclick="addToCart('Product 1',99)">
Add To Cart
</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/300/300?2">
<div class="card-content">
<h3>Product 2</h3>
<div class="price">₹149</div>
<button class="add-btn"
onclick="addToCart('Product 2',149)">
Add To Cart
</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/300/300?3">
<div class="card-content">
<h3>Product 3</h3>
<div class="price">₹199</div>
<button class="add-btn"
onclick="addToCart('Product 3',199)">
Add To Cart
</button>
</div>
</div>

</div>

</section>

<!-- CART ICON -->

<div class="cart-icon" onclick="toggleCart()">
<i class="fa-solid fa-cart-shopping"></i>
<div class="cart-count" id="count">0</div>
</div>

<!-- CART DRAWER -->

<div class="cart-drawer" id="drawer">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<input
type="text"
id="customerName"
placeholder="Customer Name">

<input
type="text"
id="customerPhone"
placeholder="Phone Number">

<button class="send-btn" onclick="sendOrder()">
Send Order
</button>

</div>

<!-- WHATSAPP -->

<a
href="https://wa.me/919346238141"
target="_blank"
class="whatsapp">
<i class="fab fa-whatsapp"></i>
</a>

<script>

emailjs.init("vaW_SdFi_NhOOr9Bs");

let cart=[];

function addToCart(name,price){

cart.push({
name,
price
});

updateCart();

}

function updateCart(){

document.getElementById("count").innerText=cart.length;

let html="";

cart.forEach(item=>{

html+=`
<div class="cart-item">
${item.name} - ₹${item.price}
</div>
`;

});

document.getElementById("cartItems").innerHTML=html;

}

function toggleCart(){

document
.getElementById("drawer")
.classList
.toggle("active");

}

function sendOrder(){

let customerName=
document.getElementById("customerName").value;

let customerPhone=
document.getElementById("customerPhone").value;

if(!customerName || !customerPhone){

alert("Enter customer details");
return;

}

let orderList=
cart.map(i=>`${i.name} - ₹${i.price}`)
.join("\n");

emailjs.send(
"service_277zwdn",
"template_5vqzuua",
{
customer_name:customerName,
customer_phone:customerPhone,
owner_email:"yuvrajgowlikar@gmail.com",
phone_number:"9346238141",
order_items:orderList
}
)
.then(()=>{

alert("Order Sent Successfully");

cart=[];
updateCart();

})
.catch(err=>{

console.log(err);
alert("Failed To Send");

});

}

setInterval(()=>{

const carousel=
document.querySelector(".carousel");

carousel.scrollLeft+=280;

if(
carousel.scrollLeft +
carousel.clientWidth >=
carousel.scrollWidth
){
carousel.scrollLeft=0;
}

},3000);

</script>

</body>
  </html>
